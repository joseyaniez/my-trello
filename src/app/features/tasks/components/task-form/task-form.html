
<label class="text-white font-bold text-xl" for="todo-form">Crea una nueva tarea</label>
<div class="flex flex-row items-center gap-2 w-1/2">
  <textarea [formControl]="taskContent" class="rounded-md flex-1 border-2 border-white h-20 p-2 my-2" id="todo-form"></textarea>
  <button (click)="saveNewTask($event)" class="rounded-full px-4 py-2 bg-cyan-400" type="button">-></button>
</div>
