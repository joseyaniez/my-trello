
<label class="text-white font-bold text-xl" for="todo-form">Crea una nueva tarea</label>
<div class="flex flex-row items-center gap-2 w-1/2">
  <textarea [formControl]="taskContent" class="rounded-lg flex-1 min-h-20 border-2 border-white h-20 p-2 my-2" id="todo-form"></textarea>
  <button (click)="saveNewTask($event)" class="rounded-lg px-4 py-2 min-h-20 bg-cyan-400 hover:bg-cyan-300 cursor-pointer" type="button">-></button>
</div>
